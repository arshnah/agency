<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KOHAKU — Inbox</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Space Mono',monospace}
  body{background:#050807;color:#E8F0EC;height:100vh;display:flex;flex-direction:column}
  .top{padding:14px 20px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:space-between}
  .top h1{font-size:18px}.acid{color:#00E08A}
  .wrap{flex:1;display:flex;overflow:hidden}
  .list{width:300px;border-right:1px solid rgba(255,255,255,.08);overflow-y:auto}
  .conv{padding:14px 18px;border-bottom:1px solid rgba(255,255,255,.05);cursor:pointer}
  .conv:hover,.conv.on{background:rgba(0,224,138,.06)}
  .conv .nm{font-size:13px;font-weight:700}.conv .pv{font-size:11px;color:rgba(255,255,255,.4);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .conv .tm{font-size:9px;color:rgba(255,255,255,.25);margin-top:4px}
  .chat{flex:1;display:flex;flex-direction:column}
  .msgs{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:10px}
  .m{max-width:70%;padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.4}
  .m.visitor{align-self:flex-start;background:rgba(255,255,255,.08)}
  .m.agency{align-self:flex-end;background:#00E08A;color:#050807}
  .composer{padding:14px;border-top:1px solid rgba(255,255,255,.08);display:flex;gap:8px}
  .composer input{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:10px 16px;color:#E8F0EC;font-size:13px}
  .composer input:focus{outline:none;border-color:rgba(0,224,138,.4)}
  .composer button{background:#00E08A;color:#050807;border:none;border-radius:20px;padding:10px 20px;font-weight:700;cursor:pointer;font-size:12px}
  .empty{flex:1;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.3);font-size:13px}
  .setup{padding:40px;max-width:500px;margin:auto;text-align:center}
  .setup input{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:12px;color:#E8F0EC;margin:8px 0;font-size:12px}
  .setup button{background:#00E08A;color:#050807;border:none;border-radius:8px;padding:12px 28px;font-weight:700;cursor:pointer;margin-top:12px}
  .leads{padding:14px 20px;border-top:1px solid rgba(255,255,255,.08);max-height:200px;overflow-y:auto}
  .leads h3{font-size:11px;color:#00E08A;margin-bottom:8px;letter-spacing:2px}
  .lead{font-size:11px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04)}
  .lead b{color:#E8F0EC}.lead span{color:rgba(255,255,255,.4)}
</style>
</head>
<body>
<div id="app"></div>
<script>
const $ = (id) => document.getElementById(id)
let sb, curConv = null

// ── Setup screen (enter creds once, saved in localStorage) ──
function setupScreen(){
  $('app').innerHTML = `
    <div class="setup">
      <h1 style="font-size:24px;margin-bottom:8px">[ <span style="color:#00E08A">AGENCY</span> ] Inbox</h1>
      <p style="color:rgba(255,255,255,.4);font-size:12px;margin-bottom:20px">Enter your Supabase project details (saved locally, one time)</p>
      <input id="url" placeholder="Supabase URL (https://xxx.supabase.co)"/>
      <input id="key" placeholder="Supabase anon key"/>
      <button onclick="saveCreds()">Connect</button>
    </div>`
}
window.saveCreds = () => {
  const url = $('url').value.trim(), key = $('key').value.trim()
  if(!url || !key) return
  localStorage.setItem('sb_url', url); localStorage.setItem('sb_key', key)
  boot()
}

function boot(){
  const url = localStorage.getItem('sb_url'), key = localStorage.getItem('sb_key')
  if(!url || !key){ setupScreen(); return }
  sb = supabase.createClient(url, key)
  render()
  loadConversations()
  loadLeads()
  // realtime: new messages
  sb.channel('admin').on('postgres_changes',{event:'INSERT',schema:'public',table:'messages'},(p)=>{
    if(p.new.conversation_id === curConv) appendMsg(p.new)
    loadConversations()
  }).subscribe()
}

function render(){
  $('app').innerHTML = `
    <div class="top">
      <h1>[ <span class="acid">AGENCY</span> ] Inbox</h1>
      <button onclick="localStorage.clear();location.reload()" style="background:none;border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.5);padding:6px 12px;border-radius:6px;cursor:pointer;font-size:11px">Logout</button>
    </div>
    <div class="wrap">
      <div style="display:flex;flex-direction:column;width:300px;border-right:1px solid rgba(255,255,255,.08)">
        <div class="list" id="list"></div>
        <div class="leads" id="leadsBox"></div>
      </div>
      <div class="chat" id="chat"><div class="empty">Select a conversation</div></div>
    </div>`
}

async function loadConversations(){
  const { data } = await sb.from('conversations').select('*').order('last_message_at',{ascending:false})
  const list = $('list'); if(!list) return
  list.innerHTML = (data||[]).map(c=>`
    <div class="conv ${c.id===curConv?'on':''}" onclick="openConv('${c.id}','${(c.visitor_name||'Visitor').replace(/'/g,'')}')">
      <div class="nm">${c.visitor_name||'Anonymous'} ${c.visitor_email?`<span style="color:rgba(255,255,255,.3);font-weight:400">· ${c.visitor_email}</span>`:''}</div>
      <div class="tm">${new Date(c.last_message_at).toLocaleString()}</div>
    </div>`).join('') || '<p style="padding:20px;color:rgba(255,255,255,.3);font-size:12px">No conversations yet</p>'
}

async function loadLeads(){
  const { data } = await sb.from('leads').select('*').order('created_at',{ascending:false}).limit(10)
  const box = $('leadsBox'); if(!box) return
  box.innerHTML = '<h3>RECENT LEADS</h3>' + (data||[]).map(l=>`
    <div class="lead"><b>${l.name}</b> <span>· ${l.email}</span><br><span>${(l.message||'').slice(0,60)}</span></div>
  `).join('') || '<h3>RECENT LEADS</h3><p style="font-size:11px;color:rgba(255,255,255,.3)">None yet</p>'
}

window.openConv = async (id, name) => {
  curConv = id
  loadConversations()
  $('chat').innerHTML = `
    <div class="msgs" id="msgs"></div>
    <div class="composer">
      <input id="reply" placeholder="Reply as agency…" onkeydown="if(event.key==='Enter')sendReply()"/>
      <button onclick="sendReply()">Send</button>
    </div>`
  const { data } = await sb.from('messages').select('*').eq('conversation_id',id).order('created_at',{ascending:true})
  $('msgs').innerHTML = (data||[]).map(m=>`<div class="m ${m.sender}">${m.body}</div>`).join('')
  $('msgs').scrollTop = $('msgs').scrollHeight
}

function appendMsg(m){
  const box = $('msgs'); if(!box) return
  box.innerHTML += `<div class="m ${m.sender}">${m.body}</div>`
  box.scrollTop = box.scrollHeight
}

window.sendReply = async () => {
  const inp = $('reply'); const body = inp.value.trim()
  if(!body || !curConv) return
  inp.value=''
  await sb.from('messages').insert({ conversation_id:curConv, body, sender:'agency' })
}

boot()
</script>
</body>
</html>
